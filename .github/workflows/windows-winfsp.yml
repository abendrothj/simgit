name: Windows WinFSP Build

# The WinFSP backend (simgitd/src/vfs/winfsp_backend) is only compiled under
# `cfg(windows)`, so it never builds on the Linux/macOS CI paths. This job is the
# only thing that exercises the winfsp_wrs link path and keeps the backend from
# silently bit-rotting against changes to SessionInfo / SessionVfsOps.
#
# Scope, honestly: this validates that the Windows backend COMPILES and LINKS
# against a real WinFSP runtime, and runs the cross-platform unit tests on
# windows-latest. It does NOT yet mount a WinFSP filesystem and drive writes
# through it — there are no Windows mount-integration tests. Add them under
# `#[cfg(all(test, windows))]` in winfsp_backend when the mount path is ready,
# then wire them into the "Run tests" step below.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"
  pull_request:
    paths:
      - "simgitd/src/vfs/**"
      - "simgitd/src/borrow/**"
      - "simgitd/src/delta/**"
      - "simgitd/Cargo.toml"
      - ".github/workflows/windows-winfsp.yml"
  push:
    branches: [main]
    paths:
      - "simgitd/src/vfs/**"
      - "simgitd/src/borrow/**"
      - "simgitd/src/delta/**"

jobs:
  windows-winfsp-build:
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WinFSP runtime
        run: choco install winfsp -y --no-progress

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build workspace (compiles + links the WinFSP backend)
        env:
          RUST_BACKTRACE: 1
        run: cargo build --workspace --all-targets

      - name: Run cross-platform unit tests
        env:
          RUST_BACKTRACE: 1
        run: cargo test --workspace
