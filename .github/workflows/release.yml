name: Release

# On every version tag, build `sg` for the common targets and attach them to
# the GitHub release as sg-<target>.tar.gz (containing sg-<target>/sg). This
# naming matches the [package.metadata.binstall] config in sg/Cargo.toml, so
# `cargo binstall simgit-cli` fetches these prebuilt binaries instead of
# compiling.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --locked --target ${{ matrix.target }} -p simgit-cli
      - name: Package
        run: |
          dir="sg-${{ matrix.target }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/sg" "$dir/"
          cp README.md LICENSE "$dir/"
          tar czf "$dir.tar.gz" "$dir"
      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$GITHUB_REF_NAME"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --verify-tag --title "$tag" --generate-notes || sleep 3
          fi
          gh release upload "$tag" "sg-${{ matrix.target }}.tar.gz" --clobber
