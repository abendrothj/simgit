name: Release

# On every version tag, build `sg` for the common targets and attach them to
# the GitHub release as sg-<target>.tar.gz (containing sg-<target>/sg). This
# naming matches the [package.metadata.binstall] config in sg/Cargo.toml, so
# `cargo binstall simgit-cli` fetches these prebuilt binaries instead of
# compiling.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} -p simgit-cli
      - name: Package
        run: |
          dir="sg-${{ matrix.target }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/sg" "$dir/"
          cp README.md LICENSE "$dir/"
          tar czf "$dir.tar.gz" "$dir"
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: sg-${{ matrix.target }}.tar.gz
