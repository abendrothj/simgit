name: Nightly SLO Gate

on:
  schedule:
    # Run every night at 2 AM UTC (10 PM Eastern)
    - cron: '0 2 * * *'
  # Also allow manual trigger for validation
  workflow_dispatch:

jobs:
  slo-gate:
    name: Mock Swarm SLO Validation
    runs-on: macos-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Create Python venv
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
      
      - name: Cache Rust build artifacts
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Run SLO Gate
        run: |
          source .venv/bin/activate
          ./tests/nightly-slo-gate.sh
      
      - name: Upload SLO artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: slo-results-${{ github.run_id }}
          path: /tmp/simgit-slo-*
          retention-days: 30
      
      - name: Comment SLO results on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Find the most recent SLO summary
            const tmpDir = '/tmp';
            let latestSummary = null;
            let latestTime = 0;
            
            try {
              const entries = fs.readdirSync(tmpDir);
              for (const entry of entries) {
                if (entry.startsWith('simgit-slo-')) {
                  const fullPath = path.join(tmpDir, entry, 'slo-summary.txt');
                  if (fs.existsSync(fullPath)) {
                    const stat = fs.statSync(fullPath);
                    if (stat.mtime.getTime() > latestTime) {
                      latestTime = stat.mtime.getTime();
                      latestSummary = fullPath;
                    }
                  }
                }
              }
            } catch (e) {
              console.log('No SLO summaries found');
            }
            
            if (!latestSummary) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '⚠️ SLO gate execution completed, but summary file not found.'
              });
              return;
            }
            
            const summary = fs.readFileSync(latestSummary, 'utf8');
            const lines = summary.split('\n').filter(l => l.trim());
            let status = 'unknown';
            
            for (const line of lines) {
              if (line.includes('overall_result:')) {
                status = line.split(':')[1].trim();
                break;
              }
            }
            
            const statusEmoji = status === 'PASS' ? '✅' : '❌';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${statusEmoji} **Nightly SLO Gate:** ${status}\n\n\`\`\`\n${summary}\n\`\`\``
            });
  
  failure-notification:
    name: Notify on SLO Failure
    runs-on: ubuntu-latest
    needs: slo-gate
    if: failure()
    
    steps:
      - name: Post failure notification
        run: |
          echo "⚠️ Nightly SLO gate failed. Check artifacts for details."
          exit 1
